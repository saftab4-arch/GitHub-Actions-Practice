services:

  app:
    build: .
    container_name: flask-app

    ports:
      - "5000:5000"

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - app-network

  postgres:
    image: postgres:17

    container_name: postgres-db

    restart: always

    env_file:
      - .env

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - app-network

volumes:
  postgres-data:

networks:
  app-network:
