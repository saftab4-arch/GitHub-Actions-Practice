name: Project 03 CI

on:
  push:
    paths:
      - "project-03-auto-deploy/**"
      - ".github/workflows/project03-ci.yml"
  workflow_dispatch:

jobs:
  test:

    runs-on: ubuntu-latest
    defaults:
        run:
          working-directory: project-03-auto-deploy

    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
         python-version: ${{ matrix.python-version }}
         cache: pip

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Ruff
      run: ruff check .

    - name: Run tests
      run: pytest

    - name: Generate test report
      run: |
          pytest --junitxml=report.xml

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pytest-report
        path: project-03-auto-deploy/report.xml


  build:
    needs: test
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Push
      uses: docker/build-push-action@v6
      with:
        context: ./project-03-auto-deploy
        push: true
        tags: syedaftab04/project03-auto-deploy:latest


