name: Project 03 CD

on:
  workflow_run:
    workflows: ["Project 03 CI"]
    types:
      - completed

jobs:

  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4
      - name: Deploy containers
        run: |
          cd /home/syedaftab04/cicd-new-project/project-03-auto-deploy
          docker compose pull
          docker compose up -d
